name: Refrescar datos del Mundial

# Mantiene el dataset (resultados) y los ratings (Elo) al día para la versión web (Pages).
# Corre en cron y también se puede disparar a mano desde la pestaña Actions.
on:
  schedule:
    - cron: '0 */6 * * *'   # cada 6 horas (UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Importar resultados y recalcular ratings (Elo)
        run: |
          node scripts/importIntlResults.mjs
          node scripts/computeRatings.mjs

      - name: Copiar al sitio estático (docs/)
        run: cp data/international_results.csv data/ratings.json docs/data/

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/international_results.csv data/ratings.json docs/data/
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos; no se commitea."
          else
            git commit -m "chore: refrescar dataset y ratings (auto)"
            git push
          fi
